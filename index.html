  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #020c1b 0%, #061428 40%, #040e20 70%, #020c1b 100%);
      overflow: hidden;
      position: relative;
    }

    /* Glow orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
    }
    .orb-1 {
      width: 600px; height: 600px;
      top: -180px; right: -100px;
      background: radial-gradient(circle, rgba(26,115,232,0.28) 0%, transparent 70%);
      animation: orbFloat1 9s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px;
      bottom: -120px; left: -80px;
      background: radial-gradient(circle, rgba(0,191,165,0.22) 0%, transparent 70%);
      animation: orbFloat2 11s ease-in-out infinite;
    }
    .orb-3 {
      width: 300px; height: 300px;
      top: 40%; left: 40%;
      background: radial-gradient(circle, rgba(255,109,0,0.1) 0%, transparent 70%);
      animation: orbFloat3 14s ease-in-out infinite;
    }
    @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,25px)} }
    @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(25px,-20px)} }
    @keyframes orbFloat3 { 0%,100%{transform:translate(0,0)} 33%{transform:translate(20px,15px)} 66%{transform:translate(-15px,20px)} }

    /* Grid overlay */
    .grid-bg {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(26,115,232,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,115,232,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* Chart line */
    .chart-svg {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 180px; opacity: 0.15; pointer-events: none;
    }
    .chart-path {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: drawLine 3.5s ease-out forwards 0.3s;
    }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }

    /* Card */
    .card {
      position: relative; z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 52px 64px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      opacity: 0;
      animation: cardIn .8s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(26,115,232,0.18); color: #93c5fd;
      padding: 6px 16px; border-radius: 50px;
      font-size: 0.78rem; font-weight: 600;
      border: 1px solid rgba(26,115,232,0.3);
      letter-spacing: 0.4px;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #00bfa5;
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Logo */
    .logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #60a5fa, #00bfa5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    /* Hint */
    .hint {
      font-size: 0.81rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Button */
    .go-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 52px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      color: #ffffff;
      background: linear-gradient(135deg, #ff6d00, #ff8f00);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(255,109,0,0.45);
      transition: transform .3s, box-shadow .3s;
    }
    .go-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 40px rgba(255,109,0,0.6);
    }
    .go-btn:hover .arrow { transform: translateX(6px); }
    .go-btn:active { transform: scale(0.97); }

    .arrow {
      display: inline-block;
      font-size: 1.1rem;
      transition: transform 0.25s;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 24px;
      margin-top: 4px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .stat-val {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.25rem;
      font-weight: 900;
      color: #60a5fa;
    }
    .stat-label {
      font-size: 0.67rem;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
      text-align: center;
    }
    .stat-div {
      width: 1px; height: 36px;
      background: rgba(255,255,255,0.08);
      align-self: center;
    }

    @media (max-width: 520px) {
      .card { padding: 40px 28px; }
      .logo { font-size: 2.1rem; }
      .stats { gap: 14px; }
    }
  </style>
